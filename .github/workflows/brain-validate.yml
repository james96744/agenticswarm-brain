name: Brain Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: pip install pyyaml jsonschema
      - name: Run single audit entrypoint
        run: python scripts/run_audit.py --repo-root . --dry-run --no-autostart
