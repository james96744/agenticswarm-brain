version: '1.0'
last_updated: '2026-03-30'
description: Runtime registry that resolves discovered capabilities into executable
  agent runtimes, model routers, and tool backends.
registry_defaults:
  enabled: true
  auto_build_from_discovery: true
  probe_scenarios_during_audit: true
  prefer_repo_local_execution: true
  allow_remote_backends: true
  require_health_metadata: true
selection_policy:
  require_real_executor_for_side_effects: true
  prefer_tool_capable_executors_for_tool_tasks: true
  prefer_provider_routers_for_dynamic_tiering: true
  allow_template_model_fallbacks: true
  limit_default_backend_bundle: 4
executor_templates:
- executor_id: codex-cli
  enabled: true
  source: template
  kind: agent_cli
  command: codex
  supports_code: true
  supports_tools: true
  supports_streaming: true
  supported_task_families:
  - coding
  - refactor
  - integration
  - debugging
  - review
- executor_id: claude-cli
  enabled: true
  source: template
  kind: agent_cli
  command: claude
  supports_code: true
  supports_tools: true
  supports_streaming: true
  supported_task_families:
  - research
  - architecture
  - review
  - security_sensitive
- executor_id: python-workflow-runner
  enabled: true
  source: template
  kind: workflow_runner
  command: python3
  supports_code: false
  supports_tools: true
  supports_streaming: false
  supported_task_families:
  - discovery
  - validation
  - maintenance
  - simulation
router_templates:
- router_id: provider-api-router
  enabled: true
  source: template
  kind: provider_api
  supports_dynamic_tiering: true
  selection_strategy: tier_then_task_family
- router_id: local-runtime-router
  enabled: true
  source: template
  kind: local_runtime
  supports_dynamic_tiering: true
  selection_strategy: prefer_low_latency
backend_templates:
- backend_id: mcp-backend
  enabled: true
  source: template
  kind: mcp_server
  category: mcp
  capabilities:
  - tool_invocation
  - context_access
- backend_id: cli-backend
  enabled: true
  source: template
  kind: cli
  category: shell_tool
  capabilities:
  - command_execution
  - artifact_generation
- backend_id: plugin-backend
  enabled: true
  source: template
  kind: plugin
  category: integration
  capabilities:
  - external_service_access
agent_executors:
- executor_id: codex-cli
  enabled: true
  kind: agent_cli
  command: codex
  path: /Applications/Codex.app/Contents/Resources/codex
  runtime: unknown
  scope: global
  source: cli:path_lookup
  supports_code: true
  supports_tools: true
  supports_streaming: true
  supports_direct_invocation: true
  invocation_mode: raw_command
  supported_task_families:
  - coding
  - refactor
  - integration
  - debugging
  - review
  - boilerplate_code
  - data_migration
  strengths:
  - repo_aware_execution
  - tool_use
  - code_changes
  auth_required: false
  secret_requirements: []
  health_status: ready
- executor_id: claude-cli
  enabled: true
  kind: agent_cli
  command: claude
  path: /Users/j/.local/bin/claude
  runtime: unknown
  scope: global
  source: cli:path_lookup
  supports_code: true
  supports_tools: true
  supports_streaming: true
  supports_direct_invocation: true
  invocation_mode: raw_command
  supported_task_families:
  - research
  - review
  - architecture
  - architecture_decision
  - security_sensitive
  strengths:
  - analysis
  - architecture
  - high_context
  auth_required: false
  secret_requirements: []
  health_status: ready
- executor_id: python-workflow-runner
  enabled: true
  kind: workflow_runner
  command: python3
  path: null
  runtime: python
  scope: global
  source: cli:path_lookup
  supports_code: false
  supports_tools: true
  supports_streaming: false
  supports_direct_invocation: true
  invocation_mode: raw_command
  supported_task_families:
  - discovery
  - validation
  - maintenance
  - simulation
  strengths:
  - local_script_execution
  - maintenance
  auth_required: false
  secret_requirements: []
  health_status: ready
- executor_id: remote-worker
  enabled: true
  kind: remote_worker
  command: null
  path: null
  runtime: queued_dispatch
  scope: global
  source: runtime_template
  supports_code: true
  supports_tools: true
  supports_streaming: false
  supports_direct_invocation: false
  invocation_mode: queued_dispatch
  supported_task_families:
  - coding
  - research
  - review
  - security_sensitive
  - architecture_decision
  - data_migration
  strengths:
  - deferred_execution
  - remote_capacity
  - queue_dispatch
  auth_required: false
  secret_requirements: []
  health_status: ready
model_routers:
- router_id: anthropic-router
  enabled: true
  kind: provider_api
  provider: anthropic
  scope: global
  source: runtime_registry
  available_model_ids:
  - anthropic-auto
  tier_coverage:
  - tier_0_router
  - tier_1_worker
  - tier_2_critic
  - tier_3_expert
  supports_dynamic_tiering: true
  selection_strategy: tier_then_task_family
  auth_required: true
  secret_requirements:
  - ANTHROPIC_API_KEY
  health_status: ready
- router_id: codex-cache-router
  enabled: true
  kind: catalog_router
  provider: codex_cache
  scope: global
  source: runtime_registry
  available_model_ids:
  - gpt-5
  - gpt-5-codex
  - gpt-5-codex-mini
  - gpt-5.1
  - gpt-5.1-codex
  - gpt-5.1-codex-max
  - gpt-5.1-codex-mini
  - gpt-5.2
  - gpt-5.2-codex
  - gpt-5.3-codex
  - gpt-5.4
  - gpt-5.4-mini
  tier_coverage:
  - tier_3_expert
  supports_dynamic_tiering: false
  selection_strategy: tier_then_task_family
  auth_required: false
  secret_requirements: []
  health_status: catalog_only
