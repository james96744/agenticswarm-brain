version: '1.0'
last_updated: '2026-03-30'
description: Portable registry for globally installed and repository-local CLI tools
  available to the orchestrator.
registry_defaults:
  enabled: true
  auto_discover: true
  prefer_repo_local_cli: true
  allow_global_cli: true
  require_absolute_path_for_global: true
  detect_package_scripts: true
selection_policy:
  require_command: true
  require_provenance: true
  prefer_non_destructive_defaults: true
  require_human_approval_for_destructive_cli: true
  precedence_order:
  - repository_declared
  - repository_discovered
  - portable_template
  - global_cli
cli_templates:
- cli_id: git
  enabled: true
  source: built_in
  category: vcs
  command: git
  destructive: true
  supports_json_output: false
  trustworthiness: 0.95
  verification_coverage: 0.8
- cli_id: jq
  enabled: true
  source: built_in
  category: data
  command: jq
  destructive: false
  supports_json_output: true
  trustworthiness: 0.95
  verification_coverage: 0.9
- cli_id: rg
  enabled: true
  source: built_in
  category: search
  command: rg
  destructive: false
  supports_json_output: false
  trustworthiness: 0.95
  verification_coverage: 0.95
cli_entries:
- cli_id: python3
  command: python3
  enabled: true
  category: runtime
  kind: local_binary
  runtime: unknown
  destructive: false
  supports_json_output: false
  path: .venv/bin/python3
  scope: local
  source: repository_binary
- cli_id: pip
