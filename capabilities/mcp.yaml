version: '1.0'
last_updated: '2026-03-29'
description: Portable registry for repository-local and globally installed MCP servers,
  configs, and resources.
registry_defaults:
  enabled: true
  auto_discover: true
  prefer_repo_local_mcp: true
  allow_global_mcp: true
  parse_server_definitions_when_possible: true
  discover_executable_wrappers: true
selection_policy:
  require_transport_metadata: true
  require_provenance: true
  prefer_verified_configs: true
  require_secret_inventory_for_remote_servers: true
  precedence_order:
  - repository_declared
  - repository_discovered
  - portable_template
  - global_mcp
mcp_templates:
- mcp_id: filesystem
  enabled: true
  source: built_in
  kind: stdio_server
  transport: stdio
  capabilities:
  - file_read
  - file_write
  - directory_listing
  auth_required: false
  secret_requirements: []
  trustworthiness: 0.9
  verification_coverage: 0.85
- mcp_id: docs
  enabled: true
  source: built_in
  kind: http_server
  transport: http
  capabilities:
  - document_lookup
  - reference_search
  - structured_context
  auth_required: depends
  secret_requirements: []
  trustworthiness: 0.85
  verification_coverage: 0.8
