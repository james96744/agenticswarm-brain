version: '1.0'
last_updated: '2026-03-29'
description: Portable registry for repository-local and external agents discovered
  by the orchestrator.
registry_defaults:
  enabled: true
  auto_discover: true
  allow_external_agents: true
  prefer_repo_local_agents: true
  require_input_schema: true
  require_output_schema: true
  score_threshold: 0.55
  track_value_add_per_token: true
agent_scoring:
  weights:
    task_relevance: 0.3
    trustworthiness: 0.2
    verification_coverage: 0.15
    latency_efficiency: 0.1
    cost_efficiency: 0.1
    context_fit: 0.1
    permission_risk_penalty: -0.15
agent_templates:
- agent_id: meta-controller
  role: orchestration
  class: controller
  enabled: true
  source: built_in
  scope:
    task_families:
    - general
    - planning
    - routing
    - escalation
    modes:
    - fast
    - balanced
    - deep
    - critical
  capabilities:
  - dynamic_planning
  - dag_generation
  - routing_strategy
  - risk_management
  allowed_tools: []
  allowed_plugins: []
  preferred_skills: []
  merge_eligible: false
  prune_protected: true
  token_budget: high
  input_schema: task_contract_v1
  output_schema: plan_contract_v1
  stop_conditions:
  - plan_approved
  - escalation_required
  - task_completed
  scoring:
    trustworthiness: 0.95
    verification_coverage: 0.9
- agent_id: capability-mapper
  role: discovery
  class: controller
  enabled: true
  source: built_in
  scope:
    task_families:
    - discovery
    - inventory
    - environment_mapping
  capabilities:
  - inspect_repo
  - inspect_agents
  - inspect_skills
  - inspect_plugins
  - inspect_clis
  - inspect_models
  - inspect_mcp
  allowed_tools: []
  allowed_plugins: []
  preferred_skills: []
  merge_eligible: false
  prune_protected: true
  token_budget: medium
  input_schema: discovery_request_v1
  output_schema: capability_map_v1
  stop_conditions:
  - inventory_complete
  scoring:
    trustworthiness: 0.9
    verification_coverage: 0.85
- agent_id: planner
  role: planning
  class: specialist
  enabled: true
  source: built_in
  scope:
    task_families:
    - planning
    - decomposition
    - workflow_design
  capabilities:
  - task_decomposition
  - dag_generation
  - fsm_design
  - replan_triggers
  allowed_tools: []
  allowed_plugins: []
  preferred_skills: []
  merge_eligible: true
  prune_protected: false
  token_budget: medium
  input_schema: task_contract_v1
  output_schema: dag_contract_v1
  stop_conditions:
  - dag_generated
  - blocked_by_missing_context
- agent_id: critic
  role: verification
  class: specialist
  enabled: true
  source: built_in
  scope:
    task_families:
    - verification
    - review
    - safety
    - quality_control
  capabilities:
  - hallucination_detection
  - structural_review
  - policy_validation
  - regression_review
  allowed_tools: []
  allowed_plugins: []
  preferred_skills: []
  merge_eligible: false
  prune_protected: true
  token_budget: medium
  input_schema: artifact_contract_v1
  output_schema: critique_contract_v1
  stop_conditions:
  - pass
  - fail
  - escalate
- agent_id: coder
  role: implementation
  class: specialist
  enabled: true
  source: discovered
  scope:
    task_families:
    - coding
    - refactor
    - integration
  capabilities:
  - code_generation
  - patch_creation
  - test_updates
  allowed_tools: []
  allowed_plugins: []
  preferred_skills: []
  merge_eligible: true
  prune_protected: false
  token_budget: medium
  merge_candidates:
  - debugger
  - tester
  input_schema: implementation_request_v1
  output_schema: code_artifact_v1
  stop_conditions:
  - code_ready_for_review
  - blocked_by_missing_dependency
