version: '1.0'
last_updated: '2026-03-29'
description: Portable registry for local and global skills used by the orchestrator.
registry_defaults:
  enabled: true
  auto_discover: true
  prefer_repo_local_skills: true
  allow_global_skills: true
  load_minimum_skill_set: true
selection_policy:
  require_description: true
  require_trigger_conditions: true
  rank_local_and_global_together: true
  unload_after_step_when_possible: true
  precedence_order:
  - repository_local
  - portable_template
  - global_skill
skill_templates:
- skill_id: discovery
  source: built_in
  enabled: true
  category: orchestration
  when:
  - inspect repository capabilities
  - inventory skills plugins agents models mcp clis
  capabilities:
  - repo_inspection
  - capability_mapping
  - environment_summary
  task_families:
  - discovery
  - bootstrap
  trustworthiness: 0.95
  verification_coverage: 0.9
- skill_id: planning
  source: built_in
  enabled: true
  category: orchestration
  when:
  - decompose ambiguous tasks
  - build task graphs
  - define execution phases
  capabilities:
  - dag_planning
  - state_machine_design
  - route_generation
  task_families:
  - planning
  - orchestration
  trustworthiness: 0.9
  verification_coverage: 0.85
- skill_id: verification
  source: built_in
  enabled: true
  category: quality
  when:
  - review output
  - check hallucinations
  - validate contracts
  capabilities:
  - critique
  - schema_validation
  - safety_review
  task_families:
  - verification
  - quality_control
  trustworthiness: 0.92
  verification_coverage: 0.95
