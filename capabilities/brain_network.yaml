  - integration_id: agentset
    name: agentset
    repo: agentset-ai/agentset
    repo_url: https://github.com/agentset-ai/agentset
    category: architecture_optimization
    kind: ingestion_platform
    install_priority: p0
    activation_state: recommend_only_until_installed
    intended_anatomy:
      - limbic_system
      - dendrites
    recommended_distribution_tiers:
      - advanced
      - enterprise
    value_claims:
      - knowledge_ingestion
      - rag_pipeline
      - citations
      - multi_format_support
    rationale: Strong ingestion and research substrate that can feed memory and replay systems.
    detection_hints:
      id_contains:
        - agentset
  - integration_id: memory-bank-mcp
    name: memory-bank-mcp
    repo: alioshr/memory-bank-mcp
    repo_url: https://github.com/alioshr/memory-bank-mcp
    category: architecture_optimization
    kind: structured_memory_layer
    install_priority: p0
    activation_state: recommend_only_until_installed
    intended_anatomy:
      - limbic_system
      - cerebrum
    recommended_distribution_tiers:
      - community
      - advanced
    value_claims:
      - active_context
      - decisions
      - progress_tracking
    rationale: Adds higher-level structured state above raw memory facts and conflicts.
    detection_hints:
      id_contains:
        - memory-bank
        - memory-bank-mcp

notes:
  - This registry is a curated strategic layer, not proof that an integration is locally installed.
  - Installed integrations should influence routing only after discovery surfaces them as executable capabilities.
  - Use install_priority plus category to decide the next adoption wave without bloating the brain network.
