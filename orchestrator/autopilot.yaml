version: "1.0"
last_updated: "2026-03-30"
description: Autopilot policy for self-running audits, startup rechecks, maintenance, and OS autostart integration.

autopilot:
  enabled: true
  install_autostart_on_manual_audit: true
  startup_recheck_enabled: true
  startup_recheck_interval_seconds: 900
  runtime_checks_on_manual_audit: true
  runtime_checks_on_startup_recheck: false
  maintenance:
    update_featureset: true
    maintain_approvals: true
    reconcile_memory: true
    prune_topology: true
    prepare_distillation: true
    seed_simulation_if_routes_empty: true
  updates:
    enabled: true
    check_git_remote: true
    git_fetch_timeout_seconds: 15
    auto_fast_forward_when_clean: true
    require_clean_worktree_for_pull: true
    refresh_featureset_on_git_change: true
    dirty_policy:
      always_ignore:
        - .venv/**
        - __pycache__/**
        - .pytest_cache/**
        - telemetry/audit.lock
        - telemetry/blackboard.lock
        - telemetry/control_plane.lock
        - telemetry/autopilot.stdout.log
        - telemetry/autopilot.stderr.log
        - telemetry/remote_fabric/**
      ignore_for_update_check:
        - .brain_integrations/**
        - telemetry/blackboard.yaml
        - telemetry/control_plane.yaml
        - telemetry/routes.yaml
        - telemetry/discovery_state.yaml
        - telemetry/autopilot_state.yaml
        - telemetry/remote_fabric/**
        - memory/conflicts.yaml
        - training/jobs.yaml
        - training/adapters.yaml
        - capabilities/runtime.yaml
  autostart:
    strategy: auto
    supported_platforms:
      - darwin
    darwin:
      mode: launchd
      run_at_load: true
      keep_alive: false

notes:
  - The manual auditor bootstraps this autopilot policy and installs autostart when supported.
  - Startup rechecks should be lightweight and only escalate to a full audit when watched roots change.
